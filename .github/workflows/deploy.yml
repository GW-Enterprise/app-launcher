name: Deploy Nexus Matrix

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Orquestador
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.GH_PAT }}

      - name: Ejecutar comandos en IONOS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: admin2
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # 1. Navegar a la carpeta
            cd /var/www/vhosts/gatewayfabrication.com.mx/nexus.gatewayfabrication.com.mx

            /usr/bin/git config --global --add safe.directory '*'
            /usr/bin/git pull origin main
            /usr/bin/git submodule update --init --recursive

            sudo -n /usr/bin/docker-compose -f compose.yaml -p nexus-matrix down || true
            sudo -n /usr/bin/docker-compose -f compose.yaml -p nexus-matrix up -d --build

            echo "--- ESTADO DE CONTENEDORES ---"
            sudo -n /usr/bin/docker ps --filter "name=nexus-matrix"
