name: Deploy Nexus Matrix

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Orquestador
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.GH_PAT }}

      - name: Ejecutar comandos en IONOS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: admin2
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |

            cd ~/nexus.gatewayfabrication.com.mx || cd ~/httpdocs/nexus.gatewayfabrication.com.mx || cd /var/www/vhosts/gatewayfabrication.com.mx/nexus.gatewayfabrication.com.mx

            git config --global --add safe.directory '*'

            git pull origin main
            git submodule update --init --recursive

            # Despliegue con Docker
            # Usamos --env-file .env para asegurar que tome tus variables de producción
            docker-compose down
            docker-compose up -d --build

            # Limpieza de imágenes "huérfanas" para ahorrar espacio en IONOS
            docker image prune -f
