name: Deploy Nexus Matrix
on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
          - service: auth-service
            context: ./auth-service
          - service: notifications-service
            context: ./notifications-service
          - service: tickets-service
            context: ./tickets-service
          - service: frontend-app
            context: ./frontend-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.GH_PAT }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_GATEWAY_URL=${{ secrets.VITE_API_GATEWAY_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ejecutar comandos en VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: admin2
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/vhosts/gatewayfabrication.com.mx/nexus.gatewayfabrication.com.mx
            
            # Login al registro en el servidor de forma permanente
            echo "${{ secrets.GH_PAT }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 1. Actualizar código (solo para el compose y configs)
            git fetch --all
            git reset --hard origin/main
            
            # 2. Descargar imágenes nuevas y levantar
            sudo -n docker compose -f compose.prod.yml -p nexus-matrix pull
            sudo -n docker compose -f compose.prod.yml -p nexus-matrix up -d --remove-orphans

            # 3. Limpiar imágenes huérfanas
            sudo -n docker image prune -f
