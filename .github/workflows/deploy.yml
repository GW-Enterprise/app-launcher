name: Deploy Nexus Matrix
on:
  push:
    branches: ["main"]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Orquestador
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.GH_PAT }}

      - name: Ejecutar comandos en VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: admin2
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            cd /var/www/vhosts/gatewayfabrication.com.mx/nexus.gatewayfabrication.com.mx

            # 1. Actualizar código
            git config --global --add safe.directory '*'
            git fetch --all
            git reset --hard origin/main
            git submodule update --init --recursive --remote

            # 2. Rebuilder y levantar solo lo que cambió
            sudo -n docker compose -f compose.prod.yml -p nexus-matrix up -d --build --remove-orphans

            # 3. Estado final
            echo "--- ESTADO DE CONTENEDORES ---"
            sudo -n docker ps --filter "name=nexus-matrix"

            # 4. Limpiar imágenes huérfanas
            echo "--- LIMPIANDO IMAGENES HUERFANAS ---"
            sudo -n docker image prune -f
