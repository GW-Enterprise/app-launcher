name: Deploy Nexus Matrix

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Orquestador
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.GH_PAT }}

      - name: Ejecutar comandos en IONOS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: admin2
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /var/www/vhosts/gatewayfabrication.com.mx/nexus.gatewayfabrication.com.mx

            echo "--- ¿QUÉ ARCHIVOS HAY AQUÍ? ---"
            ls -la

            echo "--- CONTENIDO DEL COMPOSE (PRIMERAS 10 LÍNEAS) ---"
            head -n 10 docker-compose.yml || echo "EL ARCHIVO NO EXISTE"

            # 2. Validar el compose antes de ejecutarlo
            echo "--- VALIDACIÓN DE DOCKER COMPOSE ---"
            sudo -n docker-compose config

            # 3. Ejecutar el despliegue capturando errores
            echo "--- INICIANDO DESPLIEGUE ---"
            sudo -n docker-compose -p gateway-nexus up -d --build 2>&1

            # 4. Verificación final de procesos
            echo "--- LISTA TOTAL DE CONTENEDORES ---"
            sudo -n docker ps -a
