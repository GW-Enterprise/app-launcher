name: Deploy Nexus Matrix
on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1: Detectar qué servicios cambiaron en este push
  # ─────────────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      any_changed: ${{ steps.set-matrix.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detectar archivos cambiados por servicio
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
            auth-service:
              - 'auth-service/**'
            notifications-service:
              - 'notifications-service/**'
            tickets-service:
              - 'tickets-service/**'
            frontend-app:
              - 'frontend-app/**'
            infra:
              - 'compose.prod.yml'
              - '.github/workflows/deploy.yml'

      - name: Construir matriz dinámica con los servicios cambiados
        id: set-matrix
        run: |
          INCLUDES='[]'

          FORCE_ALL="false"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            FORCE_ALL="true"
          fi

          if [ "${{ steps.filter.outputs.api-gateway }}" == "true" ] || [ "$FORCE_ALL" == "true" ]; then
            INCLUDES=$(echo $INCLUDES | jq -c '. += [{"service":"api-gateway","context":"./api-gateway"}]')
          fi
          if [ "${{ steps.filter.outputs.auth-service }}" == "true" ] || [ "$FORCE_ALL" == "true" ]; then
            INCLUDES=$(echo $INCLUDES | jq -c '. += [{"service":"auth-service","context":"./auth-service"}]')
          fi
          if [ "${{ steps.filter.outputs.notifications-service }}" == "true" ] || [ "$FORCE_ALL" == "true" ]; then
            INCLUDES=$(echo $INCLUDES | jq -c '. += [{"service":"notifications-service","context":"./notifications-service"}]')
          fi
          if [ "${{ steps.filter.outputs.tickets-service }}" == "true" ] || [ "$FORCE_ALL" == "true" ]; then
            INCLUDES=$(echo $INCLUDES | jq -c '. += [{"service":"tickets-service","context":"./tickets-service"}]')
          fi
          if [ "${{ steps.filter.outputs.frontend-app }}" == "true" ] || [ "$FORCE_ALL" == "true" ]; then
            INCLUDES=$(echo $INCLUDES | jq -c '. += [{"service":"frontend-app","context":"./frontend-app"}]')
          fi

          # Output compacto en una sola línea (soluciona el error de GitHub)
          MATRIX_JSON=$(jq -n -c --argjson inc "$INCLUDES" '{include: $inc}')
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

          if [ "$INCLUDES" == "[]" ]; then
            echo "any_changed=false" >> $GITHUB_OUTPUT
          else
            echo "any_changed=true" >> $GITHUB_OUTPUT
          fi

          # Pass infra down
          if [ "${{ steps.filter.outputs.infra }}" == "true" ] || [ "$FORCE_ALL" == "true" ]; then
            echo "infra_changed=true" >> $GITHUB_OUTPUT
          else
            echo "infra_changed=false" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────
  # JOB 2: Build y push — solo los servicios que cambiaron
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.GH_PAT }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_GATEWAY_URL=${{ secrets.VITE_API_GATEWAY_URL }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3: Deploy al VPS — corre si hubo un build o si la infra cambió
  # ─────────────────────────────────────────────────────────────
  deploy:
    needs: [detect-changes, build-and-push]
    if: |
      always() &&
      (needs.detect-changes.result == 'success') &&
      (
        needs.build-and-push.result == 'success' ||
        needs.detect-changes.outputs.infra_changed == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ejecutar comandos en VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: admin2
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/vhosts/gatewayfabrication.com.mx/nexus.gatewayfabrication.com.mx

            # Login al registro en el servidor de forma permanente
            echo "${{ secrets.GH_PAT }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 1. Actualizar código (compose.prod.yml, configs, etc.)
            git fetch --all
            # Respaldar datos antes del reset
            cp -r postgres_data_auth /tmp/postgres_data_auth_bak
            cp -r postgres_data_tickets /tmp/postgres_data_tickets_bak

            git reset --hard origin/main

            # Restaurar datos
            cp -r /tmp/postgres_data_auth_bak postgres_data_auth
            cp -r /tmp/postgres_data_tickets_bak postgres_data_tickets
            # 2. Descargar solo las imágenes que cambiaron y levantar
            #    docker compose pull compara image IDs: descarga solo las nuevas
            #    docker compose up -d recrea solo los contenedores cuya imagen cambió
            sudo -n docker compose -f compose.prod.yml -p nexus-matrix pull
            sudo -n docker compose -f compose.prod.yml -p nexus-matrix up -d --remove-orphans

            # 3. Limpiar imágenes antiguas que ya no usa ningún contenedor
            sudo -n docker image prune -f
