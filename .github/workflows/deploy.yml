name: Deploy Nexus Matrix

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Orquestador
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.GH_PAT }}

      - name: Ejecutar comandos en IONOS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: admin2
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # 1. Entrar a la carpeta
            cd /var/www/vhosts/gatewayfabrication.com.mx/nexus.gatewayfabrication.com.mx

            # 2. Actualizar código
            sudo -n git config --global --add safe.directory '*'
            sudo -n git pull origin main
            sudo -n git submodule update --init --recursive


            sudo -n docker-compose -f compose.yml -p nexus-matrix down || true
            sudo -n docker-compose -f compose.yml -p nexus-matrix up -d --build

            # 4. Limpieza y Verificación
            sudo -n docker image prune -f
            echo "--- CONTENEDORES LEVANTADOS ---"
            sudo -n docker ps --filter "name=nexus-matrix"
