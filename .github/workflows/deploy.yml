name: Deploy Nexus Matrix

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Orquestador
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          token: ${{ secrets.GH_PAT }}

      - name: Ejecutar comandos en IONOS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: admin2
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |

            TARGET="/var/www/vhosts/gatewayfabrication.com.mx/nexus.gatewayfabrication.com.mx"


            cd $TARGET            

            git pull origin main
            git submodule update --init --recursive

            sudo -n docker-compose -f compose.yaml -p nexus-matrix down || true
            sudo -n docker-compose -f compose.yaml -p nexus-matrix up -d --build


            echo "--- LISTA DE CONTENEDORES ---"
            sudo -n docker ps --filter "name=nexus-matrix"
