services:
  # --- INFRAESTRUCTURA COMÚN ---
  nats-server:
    image: nats:2.10-alpine
    container_name: nats-server
    networks:
      - gateway-app
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: always
    

  # --- BASES DE DATOS INDEPENDIENTES ---

  db-auth:
    container_name: db-auth
    image: postgres:16.11-alpine3.23
    restart: always
    networks:
      - gateway-app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_AUTH}
      DB_SPECIFIC_USER: ${APP_USER_AUTH}
      DB_SPECIFIC_PASSWORD: ${APP_USER_AUTH_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - ./postgres_data_auth:/var/lib/postgresql/data
      - ./scripts/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_AUTH}"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  db-tickets:
    container_name: db-tickets
    image: postgres:16.11-alpine3.23
    restart: always
    networks:
      - gateway-app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_TICKETS}
      DB_SPECIFIC_USER: ${APP_USER_TICKETS}
      DB_SPECIFIC_PASSWORD: ${APP_USER_TICKETS_PASSWORD}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER}
    volumes:
      - ./postgres_data_tickets:/var/lib/postgresql/data
      - ./scripts/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_TICKETS}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg-admin:
    depends_on:
      - db-auth
    container_name: pg-admin
    image: dpage/pgadmin4:9.11.0
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    networks:
      - gateway-app
    volumes:
      - ./pgadmin_data:/var/lib/pgadmin
    
  # --- MICROSERVICIOS ---
  api-gateway:
    env_file: .env.development
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
      # target: ${STAGE}
      target: dev
    container_name: api-gateway
    image: levirolea/api-gateway:${APP_VERSION}
    # image: levirolea/api-gateway:1.0.2
    networks:
      - gateway-app
    ports:
      - ${API_GATEWAY_PORT}:3000
    environment:
      NATS_SERVERS: ${NATS_SERVERS}
      APP_VERSION: ${APP_VERSION}
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
    volumes:
      - ./api-gateway/:/app
      - /app/node_modules
    depends_on:
      nats-server:
        condition: service_started
    restart: always
    healthcheck:
      # test: ["CMD-SHELL", "curl -f http://localhost:3000/health"]  # Ajusta el puerto si es necesario
      interval: 10s
      timeout: 5s
      retries: 5

  tickets-service:
    env_file: .env.development
    container_name: tickets-service
    build:
      context: ./tickets-service
      dockerfile: Dockerfile
      # target: ${STAGE}
      target: dev
    image: levirolea/tickets-service:${APP_VERSION}
    # image: levirolea/tickets-service:1.0.0
    networks:
      - gateway-app
    environment:
      NATS_SERVERS: ${NATS_SERVERS}
      APP_VERSION: ${APP_VERSION}
      PORT: ${TICKETS_SERVICE_PORT}
      DATABASE_URL: postgresql://${APP_USER_TICKETS}:${APP_USER_TICKETS_PASSWORD}@db-tickets:5432/${POSTGRES_DB_TICKETS}
    volumes:
      - ./tickets-service/:/app
      - /app/node_modules
    depends_on:
      nats-server:
        condition: service_started
      db-tickets:
        condition: service_healthy
    restart: always
    healthcheck:
      # test: ["CMD-SHELL", "curl -f http://localhost:3000/health"]  # Ajusta el puerto si es necesario
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    env_file: .env.development
    container_name: auth-service
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      # target: ${STAGE}
      target: dev
    image: levirolea/auth-service:${APP_VERSION}
    # image: levirolea/auth-service:1.0.0
    networks:
      - gateway-app
    environment:
      NATS_SERVERS: ${NATS_SERVERS}
      APP_VERSION: ${APP_VERSION}
      PORT: ${AUTH_SERVICE_PORT}
      DATABASE_URL: postgresql://${APP_USER_AUTH}:${APP_USER_AUTH_PASSWORD}@db-auth:5432/${POSTGRES_DB_AUTH}
    volumes:
      - ./auth-service/:/app
      - /app/node_modules
    depends_on:
      nats-server:
        condition: service_started
      db-auth:
        condition: service_healthy
    restart: always
    healthcheck:
      # test: ["CMD-SHELL", "curl -f http://localhost:3000/health"]  # Ajusta el puerto si es necesario
      interval: 10s
      timeout: 5s
      retries: 5

  # --- FRONTEND ---
