services:
  # --- INFRAESTRUCTURA COMÚN ---
  nats-server:
    image: nats:2.10-alpine
    container_name: nats-server
    networks:
      - gateway-app
    ports:
      - "4222:4222"
      - "8222:8222"
    restart: always
    command: ["-m", "8222"] # Activa el monitoreo en el puerto 8222
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- BASES DE DATOS INDEPENDIENTES ---

  db-auth:
    env_file: 
      - .env.prod
    container_name: db-auth
    image: postgres:16.11-alpine3.23
    restart: always
    networks:
      - gateway-app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_AUTH}
      DB_SPECIFIC_USER: ${APP_USER_AUTH}
      DB_SPECIFIC_PASSWORD: ${APP_USER_AUTH_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
    volumes:
      - ./postgres_data_auth:/var/lib/postgresql/data
      - ./scripts/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_AUTH}"]
      interval: 5s
      timeout: 5s
      retries: 5
      
  db-tickets:
    env_file: 
      - .env.prod
    container_name: db-tickets
    image: postgres:16.11-alpine3.23
    restart: always
    networks:
      - gateway-app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_TICKETS}
      DB_SPECIFIC_USER: ${APP_USER_TICKETS}
      DB_SPECIFIC_PASSWORD: ${APP_USER_TICKETS_PASSWORD}
      REPLICATION_PASSWORD: ${REPLICATION_PASSWORD}
      REPLICATION_USER: ${REPLICATION_USER}
    volumes:
      - ./postgres_data_tickets:/var/lib/postgresql/data
      - ./scripts/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_TICKETS}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- MICROSERVICIOS ---
  api-gateway:
    build:
      context: ./api-gateway
      target: prod
    env_file: 
      - .env.prod
    container_name: api-gateway
    image: levirolea/api-gateway:${APP_VERSION}
    networks:
      - gateway-app
    ports:
      - ${API_GATEWAY_PORT}:3000
    environment:
      NATS_URL: ${NATS_URL}
      APP_VERSION: ${APP_VERSION}
      API_GATEWAY_PORT: ${API_GATEWAY_PORT}
    depends_on:
      - nats-server
    restart: always
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5

  tickets-service:
    env_file: 
      - .env.prod
    container_name: tickets-service
    build:
      context: ./tickets-service
      target: prod
    image: levirolea/tickets-service:${APP_VERSION}
    networks:
      - gateway-app
    environment:
      NATS_URL: ${NATS_URL}
      APP_VERSION: ${APP_VERSION}
      DATABASE_URL: postgresql://${APP_USER_TICKETS}:${APP_USER_TICKETS_PASSWORD}@db-tickets:5432/${POSTGRES_DB_TICKETS}
    depends_on:
      nats-server:
        condition: service_healthy
      db-tickets:
        condition: service_healthy
    restart: always
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    env_file: 
      - .env.prod
    container_name: auth-service
    build:
      context: ./auth-service
      target: prod
    image: levirolea/auth-service:${APP_VERSION}
    networks:
      - gateway-app
    environment:
      NATS_URL: ${NATS_URL}
      APP_VERSION: ${APP_VERSION}
      DATABASE_URL: postgresql://${APP_USER_AUTH}:${APP_USER_AUTH_PASSWORD}@db-auth:5432/${POSTGRES_DB_AUTH}
    depends_on:
      nats-server:
        condition: service_healthy
      db-auth:
        condition: service_healthy
    restart: always
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5

# --- CONFIGURACIÓN DE RED Y VOLÚMENES ---
networks:
  gateway-app:
    driver: bridge

name: gateway-app